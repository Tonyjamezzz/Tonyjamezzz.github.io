<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>BTC DCA Calculator</title>
  <style>
    :root { --primary:#f7931a; --bg:#f4f7f6; --dark:#1a1a1a; --white:#fff; --green:#27ae60; }
    * { box-sizing:border-box; margin:0; padding:0; font-family:-apple-system, system-ui, sans-serif; }
    body { background:var(--bg); padding:15px; }
    .container { max-width:500px; margin:0 auto; }
    .card { background:var(--white); padding:20px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1); margin-bottom:20px; }
    .price-box { background:var(--dark); color:var(--primary); text-align:center; padding:15px; border-radius:12px; margin-bottom:20px; font-weight:700; }
    label { display:block; margin:10px 0 5px; font-size:0.9rem; font-weight:700; }
    input { width:100%; padding:12px; border:2px solid #eee; border-radius:10px; font-size:1rem; margin-bottom:10px; outline:none; }
    input:focus { border-color:var(--primary); }
    button { width:100%; padding:15px; background:var(--primary); color:#fff; border:none; border-radius:10px; font-weight:800; font-size:1rem; cursor:pointer; }
    .result-box { margin-top:20px; padding:20px; background:#f0fdf4; border-radius:10px; border:2px solid var(--green); text-align:center; }
    .result-val { font-size:2rem; font-weight:900; color:var(--green); margin-top:5px; }
    .visual-bar-container { margin-top:20px; height:30px; background:#eee; border-radius:15px; overflow:hidden; display:flex; }
    .invested-bar { background:#333; height:100%; transition:width .4s; }
    .profit-bar { background:var(--primary); height:100%; transition:width .4s; }
    .legend { display:flex; justify-content:space-between; font-size:.75rem; margin-top:6px; color:#666; }
    .muted { font-size:.8rem; color:#666; margin-top:8px; text-align:center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="price-box">
      BTC PRICE: <span id="price">FETCHING...</span>
    </div>

    <div class="card">
      <h3>DCA Calculator</h3>

      <label>Monthly Investment ($)</label>
      <input type="number" id="monthly" value="500" inputmode="decimal" min="0" step="1" />

      <label>Years to Hold</label>
      <input type="number" id="years" value="5" inputmode="decimal" min="0" step="1" />

      <button id="calcBtn" type="button">Calculate My Profit</button>

      <div class="result-box">
        <div style="font-size:0.8rem;color:#444;">ESTIMATED PORTFOLIO VALUE</div>
        <div id="future-val" class="result-val">$0</div>
        <div class="muted" id="invested-text"></div>
      </div>

      <div class="visual-bar-container" aria-label="Invested vs Profit bar">
        <div id="bar-invested" class="invested-bar" style="width:50%;"></div>
        <div id="bar-profit" class="profit-bar" style="width:50%;"></div>
      </div>
      <div class="legend">
        <span>● Invested</span>
        <span>Profit ●</span>
      </div>
    </div>
  </div>

  <script>
    const priceEl = document.getElementById('price');
    const monthlyEl = document.getElementById('monthly');
    const yearsEl = document.getElementById('years');
    const futureEl = document.getElementById('future-val');
    const investedTextEl = document.getElementById('invested-text');
    const barInvested = document.getElementById('bar-invested');
    const barProfit = document.getElementById('bar-profit');
    const calcBtn = document.getElementById('calcBtn');

    const fmtUSD = (n) => '$' + Math.round(n).toLocaleString();

    // CORS-friendly price source for browsers (Coinbase)
    async function getPrice() {
      try {
        const res = await fetch('https://api.coinbase.com/v2/prices/spot?currency=USD', {
          cache: 'no-store'
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const price = Number(data?.data?.amount);
        if (!Number.isFinite(price)) throw new Error('Bad price');
        priceEl.textContent = '$' + price.toLocaleString(undefined, { maximumFractionDigits: 0 });
      } catch (e) {
        priceEl.textContent = 'PRICE UNAVAILABLE';
      }
    }

    function calculateDCA() {
      const monthly = Number(monthlyEl.value);
      const years = Number(yearsEl.value);
      if (!Number.isFinite(monthly) || !Number.isFinite(years) || monthly <= 0 || years <= 0) {
        futureEl.textContent = '$0';
        investedTextEl.textContent = '';
        barInvested.style.width = '50%';
        barProfit.style.width = '50%';
        return;
      }

      // Your assumption: BTC historical avg annual growth (~69%)
      const annualRate = 0.69;
      const monthlyRate = Math.pow(1 + annualRate, 1/12) - 1;
      const totalMonths = Math.floor(years * 12);

      // FV of annuity
      const futureValue = monthly * ((Math.pow(1 + monthlyRate, totalMonths) - 1) / monthlyRate);
      const totalInvested = monthly * totalMonths;

      futureEl.textContent = fmtUSD(futureValue);
      investedTextEl.textContent = `Total invested: ${fmtUSD(totalInvested)}`;

      const investedPercent = Math.max(0, Math.min(100, (totalInvested / futureValue) * 100));
      barInvested.style.width = investedPercent + '%';
      barProfit.style.width = (100 - investedPercent) + '%';
    }

    // iOS Safari-friendly wiring
    calcBtn.addEventListener('click', calculateDCA);
    monthlyEl.addEventListener('input', calculateDCA);
    yearsEl.addEventListener('input', calculateDCA);

    // Run on load
    getPrice();
    calculateDCA();
  </script>
</body>
</html>
